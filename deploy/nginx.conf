# /etc/nginx/sites-available/votoropin.com
#
# Nginx configuration for votoropin.com — static site served from /var/www/votoropin.
# Designed to sit behind Cloudflare (orange-cloud / proxied).
#
# Flow:
#   browser → Cloudflare (terminates TLS, edge cache) → this Nginx (origin) → static files
#
# Cloudflare gives you free TLS at the edge and DDoS protection; this Nginx
# also keeps a TLS cert (via certbot) so you can use Cloudflare's "Full (strict)"
# mode — origin connections are encrypted end-to-end.

# ---- Redirect HTTP → HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name votoropin.com www.votoropin.com;
    return 301 https://votoropin.com$request_uri;
}

# ---- Redirect www → apex ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.votoropin.com;

    ssl_certificate     /etc/letsencrypt/live/votoropin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votoropin.com/privkey.pem;

    return 301 https://votoropin.com$request_uri;
}

# ---- Main host ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name votoropin.com;

    root /var/www/votoropin/dist;
    index index.html;

    # TLS (certbot-managed)
    ssl_certificate     /etc/letsencrypt/live/votoropin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votoropin.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Cloudflare real-IP (so logs show actual visitor IPs)
    # The full list at https://www.cloudflare.com/ips/ — keep this up to date.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    # Pre-compressed Brotli (Astro can emit .br files if configured)
    brotli_static on;

    # ---- Caching ----
    # HTML: short cache so content updates propagate
    location ~* \.html?$ {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }
    # Static assets with hashed filenames: long cache
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
    # Other static assets: 1 day
    location ~* \.(?:css|js|svg|woff2?|ttf|otf|png|jpg|jpeg|gif|webp|ico|pdf)$ {
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Pretty URLs (Astro generates /cv/index.html for /cv)
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Block hidden files except .well-known (used by certbot)
    location ~ /\.(?!well-known) {
        deny all;
    }
}
